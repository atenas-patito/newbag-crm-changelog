<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Changelog</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E4E2DC;
    --border-strong: #C8C5BC;
    --text-primary: #1A1917;
    --text-secondary: #6B6860;
    --text-tertiary: #A09D96;
    --accent: #1D9E75;
    --accent-light: #E1F5EE;
    --accent-mid: #085041;
    --blue-light: #E6F1FB;
    --blue-mid: #0C447C;
    --blue-border: #B5D4F4;
    --amber-light: #FAEEDA;
    --amber-mid: #633806;
    --amber-border: #FAC775;
    --purple-light: #EEEDFE;
    --purple-mid: #3C3489;
    --purple-border: #CECBF6;
    --font: -apple-system, 'Inter', 'Helvetica Neue', sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1C1C1A;
      --border: #2C2C2A;
      --border-strong: #444441;
      --text-primary: #F0EEE8;
      --text-secondary: #A09D96;
      --text-tertiary: #6B6860;
      --accent: #1D9E75;
      --accent-light: #04342C;
      --accent-mid: #9FE1CB;
      --blue-light: #042C53;
      --blue-mid: #85B7EB;
      --blue-border: #185FA5;
      --amber-light: #412402;
      --amber-mid: #FAC775;
      --amber-border: #854F0B;
      --purple-light: #26215C;
      --purple-mid: #AFA9EC;
      --purple-border: #534AB7;
    }
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .page { max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }

  .header { margin-bottom: 3rem; }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.5rem; }
  .logo { font-size: 13px; font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; }
  .header h1 { font-size: 22px; font-weight: 500; color: var(--text-primary); margin-bottom: 0.25rem; }
  .header p { font-size: 13px; color: var(--text-secondary); }
  .header-divider { border: none; border-top: 0.5px solid var(--border); margin-top: 1.5rem; }

  .filters { display: flex; gap: 8px; margin-bottom: 2rem; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px; padding: 4px 12px; border-radius: 99px;
    border: 0.5px solid var(--border-strong); background: transparent;
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    font-family: var(--font);
  }
  .filter-btn:hover { background: var(--surface); color: var(--text-primary); }
  .filter-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }

  .timeline { position: relative; }

  .year-marker {
    font-size: 11px; font-weight: 500; color: var(--text-tertiary);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 1.5rem; padding-left: 116px;
  }

  .entry { display: flex; gap: 0; margin-bottom: 0; position: relative; }

  .entry-date {
    width: 90px; min-width: 90px; text-align: right;
    padding-right: 16px; padding-top: 2px;
    font-size: 12px; color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
  }

  .entry-spine { display: flex; flex-direction: column; align-items: center; width: 20px; min-width: 20px; }
  .entry-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-strong); margin-top: 4px; flex-shrink: 0; transition: background 0.2s; }
  .entry-dot.first { background: var(--accent); }
  .entry-line { width: 1px; background: var(--border); flex: 1; min-height: 24px; }

  .entry-body { flex: 1; padding-left: 12px; padding-bottom: 2.5rem; }

  .entry-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    transition: border-color 0.15s;
  }
  .entry-card:hover { border-color: var(--border-strong); }

  .entry-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 8px; }
  .entry-title { font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.4; }
  .entry-id { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); flex-shrink: 0; padding-top: 2px; }

  .entry-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 12px; }

  .modules { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .module-badge {
    font-size: 11px; padding: 2px 9px; border-radius: 99px;
    border: 0.5px solid; font-weight: 400;
  }
  .module-badge.cuentas { background: var(--blue-light); color: var(--blue-mid); border-color: var(--blue-border); }
  .module-badge.contactos { background: var(--accent-light); color: var(--accent-mid); border-color: #9FE1CB; }
  .module-badge.oportunidades { background: var(--amber-light); color: var(--amber-mid); border-color: var(--amber-border); }
  .module-badge.posibles-clientes { background: var(--purple-light); color: var(--purple-mid); border-color: var(--purple-border); }
  .module-badge.reportes { background: #F1EFE8; color: #444441; border-color: #D3D1C7; }

  .sections { border-top: 0.5px solid var(--border); padding-top: 10px; margin-top: 4px; }
  .section-block { margin-bottom: 10px; }
  .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 5px; }
  .steps { list-style: none; }
  .step { display: flex; gap: 8px; font-size: 12px; color: var(--text-secondary); padding: 2px 0; line-height: 1.5; }
  .step-num { color: var(--text-tertiary); font-family: var(--font-mono); min-width: 16px; flex-shrink: 0; }

  .entry-note {
    font-size: 12px; color: var(--text-secondary);
    background: var(--bg); border-left: 2px solid var(--border-strong);
    padding: 6px 10px; border-radius: 0 5px 5px 0;
    margin-top: 10px;
  }

  .author-row { display: flex; align-items: center; justify-content: flex-end; margin-top: 10px; gap: 6px; }
  .author-avatar {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--border); display: flex; align-items: center;
    justify-content: center; font-size: 9px; font-weight: 500;
    color: var(--text-secondary);
  }
  .author-name { font-size: 11px; color: var(--text-tertiary); }

  .add-btn {
    position: fixed; bottom: 2rem; right: 2rem;
    background: var(--text-primary); color: var(--bg);
    border: none; border-radius: 99px;
    padding: 10px 20px; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: var(--font);
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 100;
  }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .add-btn svg { width: 14px; height: 14px; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 200;
    align-items: center; justify-content: center; padding: 1.5rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px;
    border: 0.5px solid var(--border);
    width: 100%; max-width: 580px;
    padding: 1.5rem;
  }
  .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 1.25rem; }
  .modal textarea {
    width: 100%; min-height: 160px; resize: vertical;
    background: var(--bg); border: 0.5px solid var(--border-strong);
    border-radius: 8px; padding: 10px 12px;
    font-family: var(--font); font-size: 13px; color: var(--text-primary);
    line-height: 1.6; margin-bottom: 12px;
  }
  .modal textarea:focus { outline: none; border-color: var(--accent); }
  .modal textarea::placeholder { color: var(--text-tertiary); }

  .config-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .config-input {
    flex: 1; background: var(--bg); border: 0.5px solid var(--border-strong);
    border-radius: 8px; padding: 8px 12px;
    font-family: var(--font-mono); font-size: 12px; color: var(--text-primary);
  }
  .config-input:focus { outline: none; border-color: var(--accent); }
  .config-input::placeholder { color: var(--text-tertiary); font-family: var(--font); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
  .btn-cancel {
    background: transparent; border: 0.5px solid var(--border-strong);
    border-radius: 8px; padding: 8px 16px;
    font-size: 13px; color: var(--text-secondary); cursor: pointer; font-family: var(--font);
  }
  .btn-cancel:hover { background: var(--bg); }
  .btn-publish {
    background: var(--accent); border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    color: #fff; cursor: pointer; font-family: var(--font);
    display: flex; align-items: center; gap: 6px;
    transition: opacity 0.15s;
  }
  .btn-publish:hover { opacity: 0.88; }
  .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }

  .status-msg { font-size: 12px; color: var(--text-secondary); }
  .status-msg.error { color: #E24B4A; }
  .status-msg.success { color: var(--accent); }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-tertiary); font-size: 13px; }

  @media (max-width: 540px) {
    .entry-date { width: 60px; min-width: 60px; font-size: 10px; }
    .year-marker { padding-left: 86px; }
    .entry-body { padding-left: 8px; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="header-top">
      <span class="logo">DYG</span>
    </div>
    <h1>CRM Changelog</h1>
    <p>Registro de modificaciones y actualizaciones de datos</p>
    <hr class="header-divider">
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-module="all">Todos</button>
  </div>

  <div class="timeline" id="timeline">
    <div class="empty-state">Cargando entradas...</div>
  </div>
</div>

<button class="add-btn" onclick="openModal()">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
  </svg>
  Nueva entrada
</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Nueva entrada</h2>
    <p class="modal-sub">Describí en lenguaje natural lo que hiciste. La IA lo va a estructurar y publicar.</p>
    <textarea id="raw-input" placeholder="Ej: Hoy actualicé los contactos del módulo de cuentas. Descargué todo, unifiqué por CUIT con Rubiro y cargué los códigos postales que faltaban..."></textarea>
    <div class="config-row">
      <input class="config-input" id="gh-token" type="password" placeholder="GitHub token (ghp_...)">
      <input class="config-input" id="gh-repo" type="text" placeholder="usuario/repositorio">
    </div>
    <div class="modal-actions">
      <span class="status-msg" id="status-msg"></span>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-publish" id="btn-publish" onclick="processAndPublish()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 10l6-6 6 6"/><line x1="8" y1="4" x2="8" y2="14"/>
        </svg>
        Publicar
      </button>
    </div>
  </div>
</div>

<script>
const MODULE_COLORS = {
  'Cuentas': 'cuentas',
  'Contactos': 'contactos',
  'Oportunidades': 'oportunidades',
  'Posibles Clientes': 'posibles-clientes',
  'Reportes': 'reportes'
};

let allEntries = [];
let activeFilter = 'all';

async function loadChangelog() {
  try {
    const res = await fetch('changelog.json?_=' + Date.now());
    allEntries = await res.json();
    allEntries.sort((a, b) => new Date(b.date) - new Date(a.date));
    buildFilters();
    renderTimeline(allEntries);
  } catch (e) {
    document.getElementById('timeline').innerHTML =
      '<div class="empty-state">No se pudo cargar el changelog.</div>';
  }
}

function buildFilters() {
  const modules = new Set();
  allEntries.forEach(e => (e.modules || []).forEach(m => modules.add(m)));
  const container = document.getElementById('filters');
  container.innerHTML = '<button class="filter-btn active" data-module="all" onclick="filterBy(\'all\', this)">Todos</button>';
  modules.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.module = m;
    btn.textContent = m;
    btn.onclick = () => filterBy(m, btn);
    container.appendChild(btn);
  });
}

function filterBy(module, btn) {
  activeFilter = module;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = module === 'all' ? allEntries : allEntries.filter(e => (e.modules || []).includes(module));
  renderTimeline(filtered);
}

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function getYear(iso) { return iso.slice(0, 4); }

function getInitials(name) {
  return (name || 'A').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function badgeClass(mod) {
  return MODULE_COLORS[mod] || 'reportes';
}

function renderTimeline(entries) {
  const container = document.getElementById('timeline');
  if (!entries.length) {
    container.innerHTML = '<div class="empty-state">No hay entradas para este módulo.</div>';
    return;
  }

  let html = '';
  let lastYear = null;

  entries.forEach((entry, i) => {
    const year = getYear(entry.date);
    if (year !== lastYear) {
      html += `<div class="year-marker">${year}</div>`;
      lastYear = year;
    }

    const modules = (entry.modules || []).map(m =>
      `<span class="module-badge ${badgeClass(m)}">${m}</span>`
    ).join('');

    const sections = (entry.sections || []).map(s => {
      const steps = s.steps.map((step, idx) =>
        `<li class="step"><span class="step-num">${String(idx + 1).padStart(2, '0')}</span><span>${step}</span></li>`
      ).join('');
      return `<div class="section-block">
        <div class="section-label">${s.label}</div>
        <ul class="steps">${steps}</ul>
      </div>`;
    }).join('');

    const note = entry.note
      ? `<div class="entry-note">${entry.note}</div>` : '';

    const hasDetail = sections || note;

    html += `
    <div class="entry">
      <div class="entry-date">${formatDate(entry.date)}</div>
      <div class="entry-spine">
        <div class="entry-dot ${i === 0 ? 'first' : ''}"></div>
        <div class="entry-line"></div>
      </div>
      <div class="entry-body">
        <div class="entry-card">
          <div class="entry-header">
            <span class="entry-title">${entry.title}</span>
            <span class="entry-id">#${String(entry.id).padStart(3, '0')}</span>
          </div>
          <p class="entry-desc">${entry.description}</p>
          <div class="modules">${modules}</div>
          ${hasDetail ? `<div class="sections">${sections}${note}</div>` : ''}
          <div class="author-row">
            <div class="author-avatar">${getInitials(entry.author)}</div>
            <span class="author-name">${entry.author || 'Admin'}</span>
          </div>
        </div>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('raw-input').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('status-msg').textContent = '';
  document.getElementById('status-msg').className = 'status-msg';
}

async function processAndPublish() {
  const raw = document.getElementById('raw-input').value.trim();
  const token = document.getElementById('gh-token').value.trim();
  const repo = document.getElementById('gh-repo').value.trim();
  const btn = document.getElementById('btn-publish');
  const status = document.getElementById('status-msg');

  if (!raw) { status.textContent = 'Escribí algo primero.'; status.className = 'status-msg error'; return; }
  if (!token || !repo) { status.textContent = 'Completá el token y el repositorio.'; status.className = 'status-msg error'; return; }

  btn.disabled = true;
  status.textContent = 'Estructurando con IA...';
  status.className = 'status-msg';

  try {
    const nextId = allEntries.length > 0
      ? String(Math.max(...allEntries.map(e => parseInt(e.id) || 0)) + 1).padStart(3, '0')
      : '001';

    const today = new Date().toISOString().slice(0, 10);

    const prompt = `Sos un asistente que estructura entradas de changelog de CRM.
A partir del texto libre del usuario, generá un JSON con exactamente esta estructura. Respondé SOLO con el JSON, sin texto extra, sin backticks.

{
  "id": "${nextId}",
  "date": "${today}",
  "title": "título conciso en español (máx 12 palabras)",
  "description": "descripción en 1-2 oraciones en español explicando qué se hizo y por qué",
  "modules": ["lista de módulos afectados: Cuentas, Contactos, Oportunidades, Posibles Clientes, Reportes"],
  "sections": [
    {
      "label": "Nombre de sección (ej: Cuentas)",
      "steps": ["paso 1", "paso 2", "..."]
    }
  ],
  "note": "observación o aclaración si hay algo importante, sino null",
  "author": "Admin"
}

Texto del usuario:
${raw}`;

    const aiRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const aiData = await aiRes.json();
    const rawJson = aiData.content.find(b => b.type === 'text')?.text || '';
    const clean = rawJson.replace(/```json|```/g, '').trim();
    const newEntry = JSON.parse(clean);

    status.textContent = 'Publicando en GitHub...';

    const fileRes = await fetch(`https://api.github.com/repos/${repo}/contents/changelog.json`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    const fileData = await fileRes.json();

    const updatedEntries = [newEntry, ...allEntries];
    const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(updatedEntries, null, 2))));

    const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/changelog.json`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `changelog: ${newEntry.title}`,
        content: newContent,
        sha: fileData.sha
      })
    });

    if (!putRes.ok) throw new Error('Error al publicar en GitHub');

    allEntries = updatedEntries;
    buildFilters();
    renderTimeline(allEntries);
    status.textContent = '¡Publicado!';
    status.className = 'status-msg success';
    document.getElementById('raw-input').value = '';
    setTimeout(closeModal, 1200);

  } catch (err) {
    console.error(err);
    status.textContent = 'Error: ' + err.message;
    status.className = 'status-msg error';
  } finally {
    btn.disabled = false;
  }
}

loadChangelog();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Changelog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E4E2DC;
    --border-strong: #C8C5BC;
    --text-primary: #1A1917;
    --text-secondary: #6B6860;
    --text-tertiary: #A09D96;
    --accent: #1D9E75;
    --accent-light: #E1F5EE;
    --accent-mid: #085041;
    --blue-light: #E6F1FB;
    --blue-mid: #0C447C;
    --blue-border: #B5D4F4;
    --amber-light: #FAEEDA;
    --amber-mid: #633806;
    --amber-border: #FAC775;
    --purple-light: #EEEDFE;
    --purple-mid: #3C3489;
    --purple-border: #CECBF6;
    --font: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
    --font-serif: 'Source Serif 4', Georgia, serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1C1C1A;
      --border: #2C2C2A;
      --border-strong: #444441;
      --text-primary: #F0EEE8;
      --text-secondary: #A09D96;
      --text-tertiary: #6B6860;
      --accent: #1D9E75;
      --accent-light: #04342C;
      --accent-mid: #9FE1CB;
      --blue-light: #042C53;
      --blue-mid: #85B7EB;
      --blue-border: #185FA5;
      --amber-light: #412402;
      --amber-mid: #FAC775;
      --amber-border: #854F0B;
      --purple-light: #26215C;
      --purple-mid: #AFA9EC;
      --purple-border: #534AB7;
    }
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.65;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page { max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }

  .header { margin-bottom: 2.5rem; }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1rem; }
  .logo { font-size: 11px; font-weight: 400; color: var(--text-tertiary); letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-mono); }
  .header h1 { font-size: 22px; font-weight: 400; color: var(--text-primary); margin-bottom: 0.3rem; letter-spacing: -0.02em; font-family: var(--font-serif); font-style: italic; }
  .header p { font-size: 13px; font-weight: 400; color: var(--text-secondary); font-family: var(--font-mono); letter-spacing: 0.01em; }
  .header-divider { border: none; border-top: 0.5px solid var(--border); margin-top: 1.5rem; }

  .filters { display: flex; gap: 6px; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; }
  .filters-label { font-size: 11px; color: var(--text-tertiary); margin-right: 4px; letter-spacing: 0.05em; }
  .filter-btn {
    font-size: 12px; font-weight: 400; padding: 3px 11px; border-radius: 99px;
    border: 0.5px solid var(--border); background: transparent;
    color: var(--text-secondary); cursor: pointer; transition: all 0.12s;
    font-family: var(--font); letter-spacing: 0.01em;
  }
  .filter-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .filter-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }

  .timeline { position: relative; }

  .year-marker {
    font-size: 11px; font-weight: 400; color: var(--text-tertiary);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 1.5rem; padding-left: 116px;
    font-family: var(--font-mono);
  }

  .entry { display: flex; margin-bottom: 0; }

  .entry-date {
    width: 90px; min-width: 90px; text-align: right;
    padding-right: 16px; padding-top: 3px;
    font-size: 11px; font-weight: 400; color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
    line-height: 1.4;
  }
  .entry-date .day { font-size: 13px; font-weight: 400; color: var(--text-secondary); display: block; }

  .entry-spine { display: flex; flex-direction: column; align-items: center; width: 20px; min-width: 20px; }
  .entry-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-strong); margin-top: 5px; flex-shrink: 0; transition: background 0.2s; }
  .entry-dot.first { background: var(--accent); }
  .entry-line { width: 0.5px; background: var(--border); flex: 1; min-height: 24px; }

  .entry-body { flex: 1; padding-left: 12px; padding-bottom: 2rem; }

  .entry-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    transition: border-color 0.15s;
  }
  .entry-card:hover { border-color: var(--border-strong); }

  .entry-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 6px; }
  .entry-title { font-size: 14px; font-weight: 400; color: var(--text-primary); line-height: 1.4; letter-spacing: -0.01em; font-family: var(--font-serif); }
  .entry-id { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); flex-shrink: 0; padding-top: 3px; font-weight: 400; }

  .entry-desc { font-size: 13px; font-weight: 400; color: var(--text-secondary); line-height: 1.7; margin-bottom: 10px; }

  .modules { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .module-badge {
    font-size: 11px; font-weight: 400; padding: 2px 9px; border-radius: 99px;
    border: 0.5px solid;
  }
  .module-badge.cuentas { background: var(--blue-light); color: var(--blue-mid); border-color: var(--blue-border); }
  .module-badge.contactos { background: var(--accent-light); color: var(--accent-mid); border-color: #9FE1CB; }
  .module-badge.oportunidades { background: var(--amber-light); color: var(--amber-mid); border-color: var(--amber-border); }
  .module-badge.posibles-clientes { background: var(--purple-light); color: var(--purple-mid); border-color: var(--purple-border); }
  .module-badge.default { background: var(--bg); color: var(--text-secondary); border-color: var(--border); }

  .sections { border-top: 0.5px solid var(--border); padding-top: 10px; margin-top: 6px; }
  .section-block { margin-bottom: 10px; }
  .section-label { font-size: 12px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 5px; font-family: var(--font-mono); }
  .steps { list-style: none; }
  .step { display: flex; gap: 8px; font-size: 12px; font-weight: 400; color: var(--text-secondary); padding: 2px 0; line-height: 1.55; }
  .step-num { color: var(--text-tertiary); font-family: var(--font-mono); min-width: 16px; flex-shrink: 0; font-size: 11px; padding-top: 1px; }

  .entry-note {
    font-size: 12px; font-weight: 400; color: var(--text-secondary);
    background: var(--bg); border-left: 1.5px solid var(--border-strong);
    padding: 6px 10px; border-radius: 0 5px 5px 0;
    margin-top: 10px; line-height: 1.6;
  }

  .author-row { display: flex; align-items: center; justify-content: flex-end; margin-top: 10px; gap: 6px; border-top: 0.5px solid var(--border); padding-top: 8px; }
  .author-avatar {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--bg); border: 0.5px solid var(--border-strong);
    display: flex; align-items: center;
    justify-content: center; font-size: 9px; font-weight: 400;
    color: var(--text-secondary); font-family: var(--font);
  }
  .author-name { font-size: 11px; font-weight: 400; color: var(--text-tertiary); }

  .edit-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--text-primary); color: var(--bg);
    border: none; border-radius: 8px;
    padding: 9px 16px; font-size: 12px; font-weight: 400;
    cursor: pointer; font-family: var(--font);
    text-decoration: none; letter-spacing: 0.01em;
    transition: opacity 0.15s;
  }
  .edit-btn:hover { opacity: 0.82; }
  .edit-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  .hint-box {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 10px; padding: 1.25rem;
    margin-bottom: 2.5rem;
  }
  .hint-box h3 { font-size: 13px; font-weight: 400; color: var(--text-primary); margin-bottom: 8px; font-family: var(--font-serif); }
  .hint-steps { list-style: none; counter-reset: hint-counter; }
  .hint-steps li {
    counter-increment: hint-counter; font-size: 12px; font-weight: 400;
    color: var(--text-secondary); padding: 3px 0; padding-left: 20px;
    position: relative; line-height: 1.55;
  }
  .hint-steps li::before {
    content: counter(hint-counter);
    position: absolute; left: 0;
    font-family: var(--font-mono); font-size: 10px;
    color: var(--text-tertiary); top: 5px;
  }
  .hint-steps code {
    font-family: var(--font-mono); font-size: 11px;
    background: var(--bg); padding: 1px 5px; border-radius: 4px;
    border: 0.5px solid var(--border); color: var(--text-secondary);
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .hint-sep { font-size: 11px; color: var(--text-tertiary); }
  .copy-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; color: var(--text-secondary);
    border: 0.5px solid var(--border); border-radius: 8px;
    padding: 7px 13px; font-size: 12px; font-weight: 400;
    cursor: pointer; font-family: var(--font); transition: all 0.12s;
  }
  .copy-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .copy-btn svg { width: 12px; height: 12px; }

  .prompt-area {
    width: 100%; min-height: 72px; resize: vertical;
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 9px 12px;
    font-family: var(--font); font-size: 12px; font-weight: 400;
    color: var(--text-primary); line-height: 1.6;
    margin-top: 10px; margin-bottom: 8px;
  }
  .prompt-area:focus { outline: none; border-color: var(--border-strong); }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-tertiary); font-size: 13px; font-weight: 400; }

  @media (max-width: 540px) {
    .entry-date { width: 60px; min-width: 60px; }
    .year-marker { padding-left: 86px; }
    .entry-body { padding-left: 8px; }
    .hint-box { display: none; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="header-top">
      <span class="logo">DYG · CRM</span>
      <div class="header-actions">
        <button class="copy-btn" onclick="copyPrompt()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3">
            <rect x="5" y="5" width="9" height="9" rx="1.5"/>
            <path d="M3 11V3a1 1 0 011-1h8"/>
          </svg>
          Copiar prompt
        </button>
        <a id="edit-link" href="#" target="_blank" class="edit-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3">
            <path d="M11 2l3 3-8 8H3v-3l8-8z"/>
          </svg>
          Editar
        </a>
      </div>
    </div>
    <h1>Changelog</h1>
    <p>Registro de modificaciones y actualizaciones de datos</p>
    <hr class="header-divider">
  </div>

  <div class="filters" id="filters">
    <span class="filters-label">filtrar</span>
    <button class="filter-btn active" data-module="all" onclick="filterBy('all', this)">Todos</button>
  </div>

  <div class="timeline" id="timeline">
    <div class="empty-state">Cargando entradas...</div>
  </div>
</div>

<script>
const REPO = 'atenas-patito/newbag-crm-changelog';
const CLAUDE_PROMPT = `Sos un asistente que estructura entradas de changelog de un CRM (Zoho CRM).
A partir del texto libre que te paso, generá un objeto JSON con exactamente esta estructura. Respondé SOLO con el JSON, sin texto extra, sin backticks, sin explicaciones.

{
  "id": "NNN",
  "date": "YYYY-MM-DD",
  "title": "título conciso en español (máx 12 palabras)",
  "description": "descripción en 1-2 oraciones en español explicando qué se hizo y por qué",
  "modules": ["lista de módulos afectados del CRM, ej: Cuentas, Contactos, Oportunidades, Posibles Clientes, Reportes, Campañas, etc."],
  "sections": [
    {
      "label": "Nombre de sección (ej: Cuentas)",
      "steps": ["paso 1", "paso 2"]
    }
  ],
  "note": "observación importante si hay, sino null",
  "author": "nombre de quien hizo el cambio"
}

Para el campo id: usá el siguiente número disponible en la secuencia.
Para el campo date: usá la fecha de hoy o la que mencione el usuario.

Texto:
`;

const MODULE_COLORS = {
  'cuentas': 'cuentas',
  'contactos': 'contactos',
  'oportunidades': 'oportunidades',
  'posibles clientes': 'posibles-clientes',
};

function badgeClass(mod) {
  return MODULE_COLORS[mod.toLowerCase()] || 'default';
}

let allEntries = [];

async function loadChangelog() {
  try {
    const res = await fetch('changelog.json?_=' + Date.now());
    allEntries = await res.json();
    allEntries.sort((a, b) => new Date(b.date) - new Date(a.date));
    buildFilters();
    renderTimeline(allEntries);
    setEditLink();
  } catch (e) {
    document.getElementById('timeline').innerHTML =
      '<div class="empty-state">No se pudo cargar el changelog.</div>';
  }
}

function setEditLink() {
  const link = document.getElementById('edit-link');
  if (REPO) {
    link.href = `https://github.com/${REPO}/edit/main/changelog.json`;
  } else {
    link.href = '#';
    link.title = 'Configurá REPO en el script con tu usuario/repositorio';
  }
}

function buildFilters() {
  const modules = new Set();
  allEntries.forEach(e => (e.modules || []).forEach(m => modules.add(m)));
  const container = document.getElementById('filters');
  container.innerHTML = '<span class="filters-label">filtrar</span><button class="filter-btn active" data-module="all" onclick="filterBy(\'all\', this)">Todos</button>';
  modules.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.module = m;
    btn.textContent = m;
    btn.onclick = () => filterBy(m, btn);
    container.appendChild(btn);
  });
}

function filterBy(module, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = module === 'all' ? allEntries : allEntries.filter(e => (e.modules || []).includes(module));
  renderTimeline(filtered);
}

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  const day = d.getDate().toString().padStart(2, '0');
  const month = d.toLocaleDateString('es-AR', { month: 'short' });
  const year = d.getFullYear();
  return { day, month, year };
}

function getYear(iso) { return iso.slice(0, 4); }
function getInitials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function renderTimeline(entries) {
  const container = document.getElementById('timeline');
  if (!entries.length) {
    container.innerHTML = '<div class="empty-state">No hay entradas para este módulo.</div>';
    return;
  }

  let html = '';
  let lastYear = null;

  entries.forEach((entry, i) => {
    const year = getYear(entry.date);
    if (year !== lastYear) {
      html += `<div class="year-marker">${year}</div>`;
      lastYear = year;
    }

    const { day, month } = formatDate(entry.date);

    const modules = (entry.modules || []).map(m =>
      `<span class="module-badge ${badgeClass(m)}">${m}</span>`
    ).join('');

    const sections = (entry.sections || []).map(s => {
      const steps = s.steps.map((step, idx) =>
        `<li class="step"><span class="step-num">${String(idx + 1).padStart(2, '0')}</span><span>${step}</span></li>`
      ).join('');
      return `<div class="section-block"><div class="section-label">${s.label}</div><ul class="steps">${steps}</ul></div>`;
    }).join('');

    const note = entry.note ? `<div class="entry-note">${entry.note}</div>` : '';
    const hasDetail = sections || note;

    html += `
    <div class="entry">
      <div class="entry-date">
        <span class="day">${day}</span>${month}
      </div>
      <div class="entry-spine">
        <div class="entry-dot ${i === 0 ? 'first' : ''}"></div>
        <div class="entry-line"></div>
      </div>
      <div class="entry-body">
        <div class="entry-card">
          <div class="entry-header">
            <span class="entry-title">${entry.title}</span>
            <span class="entry-id">#${String(entry.id).padStart(3, '0')}</span>
          </div>
          <p class="entry-desc">${entry.description}</p>
          <div class="modules">${modules}</div>
          ${hasDetail ? `<div class="sections">${sections}${note}</div>` : ''}
          <div class="author-row">
            <div class="author-avatar">${getInitials(entry.author)}</div>
            <span class="author-name">${entry.author || 'Admin'}</span>
          </div>
        </div>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function copyPrompt() {
  navigator.clipboard.writeText(CLAUDE_PROMPT).then(() => {
    const btn = document.querySelector('.copy-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" width="12" height="12"><path d="M2 8l4 4 8-8"/></svg> Copiado`;
    setTimeout(() => { btn.innerHTML = orig; }, 1800);
  });
}

loadChangelog();
</script>
</body>
</html>
